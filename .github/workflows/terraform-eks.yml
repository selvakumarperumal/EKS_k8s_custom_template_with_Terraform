name: "Deploy EKS Cluster"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      action:
        description: "Terraform Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.14.0"
  AWS_REGION: "us-east-1" # Change this to match your deployment region

jobs:
  terraform:
    name: "Terraform Execution"
    runs-on: ubuntu-latest

    # Set proper permissions for OIDC authentication if you plan to use it later
    permissions:
      id-token: write
      contents: read

    # =========================================================================
    # TF_VAR_* ENVIRONMENT VARIABLES
    # =========================================================================
    # HOW THIS WORKS:
    #   Terraform has a built-in feature where it automatically reads any
    #   environment variable starting with "TF_VAR_" and maps it to a
    #   Terraform input variable. No extra flags needed.
    #
    # FLOW:
    #   1. You store a value in GitHub Secrets (Settings → Secrets → Actions)
    #      Example: TF_VAR_DB_USERNAME = "admin"
    #
    #   2. The workflow maps it to an env var:
    #      TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
    #      (This is like running: export TF_VAR_db_username="admin")
    #
    #   3. Terraform auto-detects it at runtime:
    #      Found TF_VAR_db_username → strips "TF_VAR_" prefix
    #      → looks for variable "db_username" in variables.tf → FOUND
    #      → sets var.db_username = "admin"
    #
    #   4. The value flows to the secrets-manager module:
    #      main.tf:  db_username = var.db_username
    #      module:   username = var.db_username → stored in AWS Secrets Manager
    #
    # WHAT TO ADD IN GITHUB SECRETS:
    #   Required (always):
    #     AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
    #
    #   Optional (only if create_db_secret = true in your .tfvars):
    #     TF_VAR_DB_USERNAME, TF_VAR_DB_PASSWORD, TF_VAR_DB_HOST,
    #     TF_VAR_DB_PORT, TF_VAR_DB_NAME, TF_VAR_DB_ENGINE
    #
    #   Optional (only if create_api_secret = true):
    #     TF_VAR_API_KEY, TF_VAR_API_SECRET
    #
    #   Optional (only if create_app_config_secret = true):
    #     TF_VAR_APP_CONFIG (JSON string, e.g. '{"LOG_LEVEL":"info"}')
    #
    # NOTE: If a GitHub Secret doesn't exist, the env var is empty (""),
    #       which is fine — Terraform variables have default = "" anyway.
    # =========================================================================
    env:
      # Database credentials
      TF_VAR_db_username: ${{ secrets.TF_VAR_DB_USERNAME }}
      TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
      TF_VAR_db_host: ${{ secrets.TF_VAR_DB_HOST }}
      TF_VAR_db_port: ${{ secrets.TF_VAR_DB_PORT }}
      TF_VAR_db_name: ${{ secrets.TF_VAR_DB_NAME }}
      TF_VAR_db_engine: ${{ secrets.TF_VAR_DB_ENGINE }}
      # API keys
      TF_VAR_api_key: ${{ secrets.TF_VAR_API_KEY }}
      TF_VAR_api_secret: ${{ secrets.TF_VAR_API_SECRET }}
      # App configuration
      TF_VAR_app_config: ${{ secrets.TF_VAR_APP_CONFIG }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action == 'plan'
        run: terraform plan -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -auto-approve

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -auto-approve
